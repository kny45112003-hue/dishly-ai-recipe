<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 페이지</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/login.css" />

    <script src="../js/login.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <main class="page-frame login-page">
        <section class="login-layout">
          <!-- 데스크탑 왼쪽 비주얼 -->
          <div class="login-visual">
            <div class="login-visual-inner">
              <h1 class="login-visual-title">나만의 식단을 시작하세요</h1>
              <p class="login-visual-desc">AI가 식단 관리를 도와드립니다</p>

              <div class="login-visual-image">
                <img
                  src="../assets/image/fepa.png"
                  class="login-food-img"
                  alt="로그인 비주얼 이미지"
                />
              </div>
            </div>
          </div>

          <!-- 공통 로그인 폼 -->
          <section class="login-content">
            <div class="login-logo-wrap">
              <img
                src="../assets/icon/main-icon.png"
                class="login-logo-img"
                alt="식단 관리 아이콘"
              />
            </div>

            <div class="login-copy">
              <h2 class="login-title">다시한번 오신걸 환영합니다</h2>
              <p class="login-desc">로그인 후 서비스를 이용해보세요</p>
            </div>

            <form class="login-form">
              <div class="login-input-group">
                <input
                  type="text"
                  class="login-input"
                  placeholder="아이디"
                  name="userId"
                />
              </div>

              <div class="login-input-group">
                <input
                  type="password"
                  class="login-input"
                  placeholder="비밀번호"
                  name="password"
                />
              </div>

              <button type="submit" class="login-btn">로그인</button>
            </form>

            <div class="login-extra">
              <button type="button" class="signup-btn">회원가입하기</button>
            </div>
            <div class="social-section">
              <div class="social-divider">
                <span>소셜계정으로 로그인</span>
              </div>
              <div class="social-login">
                <button
                  type="button"
                  class="social-btn"
                  aria-label="구글 로그인"
                >
                  <img src="../assets/icon/google-icon.png" alt="구글" />
                </button>

                <button
                  type="button"
                  class="social-btn"
                  aria-label="엑스 로그인"
                >
                  <img src="../assets/icon/x-icon.png" alt="엑스" />
                </button>

                <button
                  type="button"
                  class="social-btn"
                  aria-label="네이버 로그인"
                >
                  <img src="../assets/icon/naver-icon.png" alt="네이버" />
                </button>

                <button
                  type="button"
                  class="social-btn"
                  aria-label="카카오 로그인"
                >
                  <img src="../assets/icon/kakao-icon.png" alt="카카오" />
                </button>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
