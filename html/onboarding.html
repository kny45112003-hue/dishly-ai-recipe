<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온보딩 시작</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/onboarding-start.css" />

    <script src="../js/onboarding.js" defer></script>
  </head>
  <body>
    <main class="page-frame">
      <div class="onboarding-wrapper">
        <section class="onboarding-content">
          <div class="onboarding-text-side">
            <img src="../assets/image/desh.png" class="onboarding-image" />

            <h1 class="onboarding-title">
              냉장고 속 재료로<br />
              건강한 식단을 시작하세요
            </h1>

            <p class="onboarding-desc">남은 재료로 레시피를 추천해드릴게요</p>
          </div>
        </section>

        <div class="bottom-area">
          <div class="onboarding-actions">
            <span>Next</span>
            <img src="../assets/icon/range.png" class="next-icon" />
          </div>

          <div class="onboarding-bar-container">
            <div class="onboarding-bar-fill"></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
