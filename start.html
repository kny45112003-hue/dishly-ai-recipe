<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시작 페이지</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/start.css" />

    <script src="js/start.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <main class="page-frame start-page">
        <section class="start-content">
          <div class="start-logo-wrap">
            <img
              src="assets/image/desh.png"
              alt="Dishly 로고"
              class="start-logo"
            />
          </div>

          <div class="start-copy">
            <h1 class="start-title">나만의 건강한 식습관을 찾아보세요!</h1>
          </div>

          <div class="start-actions">
            <button type="button" class="start-btn start-btn-primary">
              로그인 또는 회원가입
            </button>
            <button type="button" class="start-btn start-btn-secondary">
              게스트로 계속하기
            </button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
