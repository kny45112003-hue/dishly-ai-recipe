<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온보딩-1</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/onboarding.css" />
    <link rel="stylesheet" href="css/onboarding-1.css" />

    <script src="js/onboarding.js" defer></script>
  </head>
  <body>
    <main class="page-frame">
      <section class="onboarding-step1">
        <!-- 상단 제목 -->
        <div class="step1-header">
          <p class="step-label">목표 설정</p>
          <h1 class="onboarding-title">어떤 식단을 원하시나요?</h1>
          <p class="onboarding-desc">
            남은 재료와 목표에 맞춰 레시피를 추천해드려요
          </p>
        </div>

        <!-- 카드 선택 영역 -->
        <section class="goal-grid">
          <button
            class="goal-card active"
            data-default="assets/icon/weight-icon.png"
            data-active="assets/icon/weight-icon-chose.png"
          >
            <img
              src="assets/icon/weight-icon.png"
              class="goal-icon"
              alt="다이어트식단"
            />
            <span>다이어트식단</span>
          </button>

          <button
            class="goal-card"
            data-default="assets/icon/stand-icon.png"
            data-active="assets/icon/stand-icon-chose.png"
          >
            <img
              src="assets/icon/stand-icon.png"
              class="goal-icon"
              alt="몸매유지식단"
            />
            <span>몸매유지식단</span>
          </button>

          <button
            class="goal-card"
            data-default="assets/icon/food-icon.png"
            data-active="assets/icon/food-icon-chose.png"
          >
            <img
              src="assets/icon/food-icon.png"
              class="goal-icon"
              alt="일반식단"
            />
            <span>일반식단</span>
          </button>

          <button
            class="goal-card"
            data-default="assets/icon/muse-icon.png"
            data-active="assets/icon/muse-icon-chose.png"
          >
            <img
              src="assets/icon/muse-icon.png"
              class="goal-icon"
              alt="벌크업식단"
            />
            <span>벌크업식단</span>
          </button>
        </section>

        <!-- 하단 -->
        <div class="step1-bottom">
          <div class="onboarding-bar-container">
            <div class="onboarding-bar-fill" style="width: 50%"></div>
          </div>

          <div class="onboarding-actions">
            <span>Next</span>
            <img src="assets/icon/range.png" alt="next" class="next-icon" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
